name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and push Docker image and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/brun0.codes:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/brun0.codes:${{ github.sha }}
          platforms: linux/amd64

      - name: Deploy to production
        run: |
          curl -X 'POST' \
            "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H 'accept: application/json' \
            -H "x-api-key: ${{ secrets.DOKPLOY_AUTH_TOKEN }}" \
            -H 'Content-Type: application/json' \
            -d '{"applicationId": "${{ secrets.DOKPLOY_APPLICATION_ID }}"}'
